version: 2

sources:
  - name: spotify_raw
    schema: raw
    tables:
      - name: spotify_saved_tracks
        config:
          loaded_at_field: "try_cast(ingest_run_at as timestamp)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
      - name: spotify_track_artists
        config:
          loaded_at_field: "try_cast(ingest_run_at as timestamp)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
      - name: musicbrainz_recordings
      - name: spotify_musicbrainz_map
      - name: musicbrainz_isrc_candidates
      - name: musicbrainz_recording_payloads
      - name: musicbrainz_work_payloads
      - name: musicbrainz_isrc_failures
      - name: musicbrainz_recording_metadata
      - name: musicbrainz_artists
      - name: musicbrainz_releases
      - name: musicbrainz_works
      - name: musicbrainz_work_writers

models:
  - name: stg_spotify_saved_tracks
    description: |
      Pipeline role: Staging input that standardizes raw Spotify saved-track records for downstream joins and scoring; this model does not feed the external Python enrichment worker directly.
      Medallion layer: Silver (staging/conformance layer built from Bronze raw sources).
    columns:
      - name: track_id
        tests: [not_null, unique]
      - name: added_at
        tests: [not_null]
      - name: isrc
        description: Spotify-reported ISRC used for reference matching.
  - name: stg_spotify_track_artists
    description: |
      Pipeline role: Staging input that standardizes track-to-artist attribution from Spotify for downstream enrichment joins and mart projections.
      Medallion layer: Silver (staging/conformance layer built from Bronze raw sources).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null]
      - name: artist_id
        tests: [not_null]
  - name: stg_spotify_musicbrainz_map
    description: |
      Pipeline role: Staging crosswalk of Spotify track IDs to best matched MusicBrainz recording MBIDs, consumed by intermediate enrichment models and final marts.
      Medallion layer: Silver (staging/conformance layer over Bronze raw mapping outputs).
    columns:
      - name: track_id
        tests: [not_null, unique]
      - name: recording_mbid
        description: Matched MusicBrainz recording identifier.
  - name: stg_musicbrainz_enrichment_queue
    description: |
      Pipeline role: Enrichment feeder model that identifies tracks still missing MusicBrainz mapping/metadata and is exported to CSV for the Python enrichment process.
      Medallion layer: Silver (staging/conformance layer that bridges Bronze raw data to enrichment processing).
    columns:
      - name: track_id
        tests: [not_null, unique]
      - name: isrc
        tests: [not_null]
  - name: stg_musicbrainz_recordings
    description: |
      Pipeline role: Staging model that normalizes the latest recording payload per MBID after Python enrichment results are loaded back into raw tables.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: recording_mbid
        tests: [not_null, unique]
  - name: stg_musicbrainz_recording_metadata
    description: |
      Pipeline role: Staging model for normalized API-derived recording metadata (genres, styles, instruments, cover/work context) produced by the enrichment workflow and used by intermediate joins.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: recording_mbid
        tests: [not_null]
      - name: top_genre
        description: Most-voted MusicBrainz genre for the recording.
      - name: top_style
        description: Most-voted tag not already in genre list.
      - name: instrument_list_json
        description: JSON array of performer relation attributes treated as instrument hints.
      - name: primary_work_mbid
        description: Linked compositional work MBID when available.
      - name: is_cover
        description: True when the matched recording is marked as a cover of another recording.
  - name: int_playlist_ready_tracks_base
    description: |
      Pipeline role: Intermediate enrichment model that joins Spotify and MusicBrainz staging models into a single track-grain base relation for playlist-focused marts.
      Medallion layer: Silver (enrichment/intermediate layer).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null]
  - name: int_playlist_entity_context_base
    description: |
      Pipeline role: Intermediate enrichment model that assembles entity-rich track context (release and writer rollups) used directly by downstream mart outputs.
      Medallion layer: Silver (enrichment/intermediate layer).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null]
  - name: stg_musicbrainz_artists
    description: |
      Pipeline role: Staging model for normalized MusicBrainz artist entities captured during enrichment and reused by entity-context joins.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: artist_mbid
        tests: [not_null]
      - name: artist_name
        description: MusicBrainz artist display name.
  - name: stg_musicbrainz_releases
    description: |
      Pipeline role: Staging model for normalized release entities and release-group typing loaded from enrichment outputs and consumed by intermediate context models.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: release_mbid
        tests: [not_null]
      - name: release_group_primary_type
        description: Primary release-group type, such as Album or Single.
  - name: stg_musicbrainz_works
    description: |
      Pipeline role: Staging model for normalized compositional work entities linked to matched recordings and used in writer/context enrichment.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: work_mbid
        tests: [not_null]
      - name: work_title
        description: Work/composition title.
  - name: stg_musicbrainz_work_writers
    description: |
      Pipeline role: Staging model for normalized writer/composer/lyricist relationships from MusicBrainz works, feeding intermediate entity-context assembly.
      Medallion layer: Silver (staging/conformance layer over Bronze enriched payload tables).
    columns:
      - name: work_mbid
        tests: [not_null]
      - name: writer_role
        description: Relationship type (writer, composer, lyricist, librettist).
  - name: fct_playlist_ready_tracks
    description: |
      Pipeline role: Final output fact mart for playlist selection, providing one row per track with denormalized artist context and playlist scoring features.
      Medallion layer: Gold (mart/output dataset layer).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null, unique]
      - name: updated_at
        tests: [not_null]
        description: Latest timestamp across Spotify ingest and MusicBrainz map/recording/metadata updates.
      - name: top_genre
        description: Primary MusicBrainz genre for the matched recording.
      - name: top_style
        description: Primary style-like tag for the matched recording.
      - name: instrument_list_json
        description: JSON array of instrument/performance hints from MusicBrainz relations.
      - name: primary_work_mbid
        description: Linked compositional work MBID.
      - name: is_cover
        description: Whether this recording is tagged as a cover in MusicBrainz relations.
      - name: work_writer_list_json
        description: JSON array of songwriters/composers from MusicBrainz work relations.
      - name: playlist_fit_score
        description: Heuristic score to help ranking for playlist generation.
  - name: fct_playlist_entity_context
    description: |
      Pipeline role: Final output fact mart for auto-playlist generation with one-row-per-track entity context, release typing, writer rollups, and scoring.
      Medallion layer: Gold (mart/output dataset layer).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null, unique]
      - name: updated_at
        tests: [not_null]
        description: Latest timestamp across Spotify and MusicBrainz entity updates.
      - name: release_group_types
        description: Comma-separated MusicBrainz release-group types linked to the recording.
      - name: has_single_release
        description: True if the recording is linked to any Single release-group type.
      - name: has_album_release
        description: True if the recording is linked to any Album release-group type.
      - name: writer_names
        description: Aggregated writer/composer/lyricist names from the linked work.
      - name: is_cover
        description: Whether the recording is a cover according to MusicBrainz recording relations.
      - name: auto_playlist_score
        description: Ranking score tuned for auto playlist generation.
  - name: fct_artist_stats
    description: |
      Pipeline role: Final output fact mart that aggregates artist-level statistics from staged/enriched track data for analysis and ranking use cases.
      Medallion layer: Gold (mart/output dataset layer).
    columns:
      - name: id
        tests: [not_null, unique]
      - name: artist_id
        tests: [not_null]
  - name: dim_favorite_artist
    description: |
      Pipeline role: Final output dimension mart that materializes the current favorite artist summary for downstream consumption.
      Medallion layer: Gold (mart/output dataset layer).
    columns:
      - name: id
        tests: [not_null, unique]
  - name: fct_track_duplicates
    description: |
      Pipeline role: Final output fact mart for duplicate diagnostics, surfacing ISRC collision groups as a quality/triage dataset.
      Medallion layer: Gold (mart/output dataset layer).
    columns:
      - name: id
        tests: [not_null, unique]
  - name: int_track_instrument
    description: |
      Pipeline role: Intermediate enrichment bridge model that explodes/normalizes track-to-instrument relationships from metadata for downstream mart features.
      Medallion layer: Silver (enrichment/intermediate layer).
    columns:
      - name: track_id
        tests: [not_null]
      - name: instrument_name
        tests: [not_null]
        description: Lower-case instrument name with punctuation and tag-like wrappers removed.
