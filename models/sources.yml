version: 2

sources:
  - name: spotify_raw
    schema: raw
    description: Raw ingestion and enrichment landing tables loaded by Python scripts and dbt macros.
    tables:
      - name: spotify_saved_tracks
        description: Raw Spotify saved-track payload rows at track grain.
        config:
          loaded_at_field: "try_cast(ingest_run_at as timestamp)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
      - name: spotify_track_artists
        description: Raw Spotify artist attribution rows (one row per track and artist order).
        config:
          loaded_at_field: "try_cast(ingest_run_at as timestamp)"
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 168, period: hour}
      - name: musicbrainz_recordings
        description: Raw recording-level MusicBrainz reference rows loaded from enrichment results.
      - name: spotify_musicbrainz_map
        description: Raw track-to-recording mapping rows populated by enrichment candidate selection.
      - name: musicbrainz_isrc_candidates
        description: Raw MusicBrainz candidate matches by ISRC returned by the enrichment fetcher.
      - name: musicbrainz_recording_payloads
        description: Raw full recording JSON payload snapshots from MusicBrainz APIs.
      - name: musicbrainz_work_payloads
        description: Raw full work/composition JSON payload snapshots from MusicBrainz APIs.
      - name: musicbrainz_isrc_failures
        description: Raw retry/error state tracking table for ISRC enrichment failures.
      - name: musicbrainz_recording_metadata
        description: Raw flattened recording metadata rows (genres, styles, instruments, links) from enrichment.
      - name: musicbrainz_artists
        description: Raw flattened artist entity rows derived from recording payloads.
      - name: musicbrainz_releases
        description: Raw flattened release and release-group rows derived from recording payloads.
      - name: musicbrainz_works
        description: Raw flattened work/composition entity rows derived from work payloads.
      - name: musicbrainz_work_writers
        description: Raw flattened writer/composer/lyricist relationship rows for works.
